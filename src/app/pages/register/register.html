<h2>Create Account</h2>


<input
type="text"
placeholder="Full Name"
[(ngModel)]="fullName">


<br><br>


<input
type="text"
placeholder="Mobile Number"
[(ngModel)]="mobile">


<br><br>


<input
type="email"
placeholder="Email"
[(ngModel)]="email">


<br><br>


<input
type="password"
placeholder="Password"
[(ngModel)]="password">


<br><br>


<button
(click)="register()">

Register

</button>
