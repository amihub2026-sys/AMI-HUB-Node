<section class="add-job-page">

  <div class="add-job-header">
    <div class="header-icon">💼</div>
    <h1>Post a Job Vacancy</h1>
    <p>Add your job details and connect with the right candidates faster.</p>
  </div>

<form
  class="add-job-form"
  #jobForm="ngForm"
  (ngSubmit)="submitJob()">
    <!-- BASIC DETAILS -->
    <div class="form-section">
      <div class="section-title">
        <span>👤</span>
        <h2>Basic Details</h2>
      </div>

      <div class="form-grid">
        <div class="form-group">
       <label class="required-label">Job Title</label>
         <input
  type="text"
  placeholder="Frontend Developer"
  [(ngModel)]="job.title"
  name="title"
  required>
        </div>

        <div class="form-group">
      <label class="required-label">Company name</label>
          <input
  type="text"
  placeholder="AMI HUB"
  [(ngModel)]="job.company"
  name="company"
  required>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" placeholder="Madurai" [(ngModel)]="job.location" name="location">
        </div>

        <div class="form-group">
          <label>Job Type</label>
          <select [(ngModel)]="job.jobType" name="jobType">
            <option value="">Select Job Type</option>
            <option value="Full Time">Full Time</option>
            <option value="Part Time">Part Time</option>
            <option value="Internship">Internship</option>
            <option value="Contract">Contract</option>
          </select>
        </div>

        <div class="form-group">
          <label>Work Mode</label>
          <select [(ngModel)]="job.workMode" name="workMode">
            <option value="">Select Work Mode</option>
            <option value="On Site">On Site</option>
            <option value="Remote">Remote</option>
            <option value="Hybrid">Hybrid</option>
          </select>
        </div>
      </div>
    </div>

    <!-- JOB INFORMATION -->
    <div class="form-section">
      <div class="section-title">
        <span>📋</span>
        <h2>Job Information</h2>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Salary</label>
          <input type="text" placeholder="₹20,000 - ₹35,000" [(ngModel)]="job.salary" name="salary">
        </div>

        <div class="form-group">
          <label>Experience</label>
          <input type="text" placeholder="1 - 3 Years" [(ngModel)]="job.experience" name="experience">
        </div>

        <div class="form-group">
          <label>No. of Vacancies</label>
          <input type="number" placeholder="5" [(ngModel)]="job.vacancies" name="vacancies">
        </div>

        <div class="form-group full">
          <label>Skills Required</label>
          <input type="text" placeholder="Angular, Flutter, Supabase" [(ngModel)]="job.skills" name="skills">
        </div>

        <div class="form-group full">
          <label>Job Description</label>
          <textarea placeholder="Enter job role, responsibilities and requirements..." [(ngModel)]="job.description" name="description"></textarea>
        </div>
      </div>
    </div>

    <!-- CONTACT DETAILS -->
    <div class="form-section">
      <div class="section-title">
        <span>☎️</span>
        <h2>Contact Details</h2>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Contact Email</label>
          <input type="email" placeholder="hr@company.com" [(ngModel)]="job.contactEmail" name="contactEmail">
        </div>

        <div class="form-group">
        <label class="required-label">Contact Phone</label>
<input
  type="tel"
  placeholder="+91 98765 43210"
  [(ngModel)]="job.contactPhone"
  name="contactPhone"
  required
  minlength="10"
  maxlength="15">        </div>
      </div>
    </div>

    <button
  type="submit"
  class="submit-btn"
  [disabled]="jobForm.invalid">
      🚀 Add Job Vacancy
    </button>

  </form>

</section>
