<app-search-results
    [results]="displayedPosts()"
    type="product">
</app-search-results>


<!-- CATEGORY -->
<app-categories
*ngIf="!showSubcategories"
(categorySelected)="onCategorySelected($event)">
</app-categories>


<!-- SUBCATEGORY -->
<app-subcategories
*ngIf="showSubcategories"
[selectedCategory]="selectedCategory"
(back)="showSubcategories=false">
</app-subcategories>

<div class="page-layout">


  <!-- FILTER MOBILE BACKDROP -->
  <div
    class="filter-backdrop"
    *ngIf="isFilterOpen"
    (click)="toggleFilter()">
  </div>



  <!-- FILTER -->
  <aside 
    class="left-panel"
    [class.active]="isFilterOpen">

    <app-filters
      (filtersApplied)="onFiltersApplied($event)"
      (filtersReset)="onFiltersReset()">
    </app-filters>

  </aside>


  <!-- PRODUCT LOADING UI -->
<div
  class="product-loading-ui"
  *ngIf="isLoading()"
>

  <div class="product-loading-dots">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <p>Loading products...</p>

</div>

  <!-- RIGHT CONTENT -->
  <main class="results-content">



    <!-- SUB CATEGORY BAR -->
   <div
      class="subcategory-bar"
      *ngIf="subcategories().length > 0">


      <button
        type="button"
        class="subcategory-chip"
        [class.active]="selectedSubcategoryId === null"
        (click)="showAllSubcategoryPosts()">

        All

      </button>



      <button
        type="button"
        class="subcategory-chip"
        *ngFor="let sub of subcategories()"
        [class.active]="selectedSubcategoryId === sub.subcategoryid"
        (click)="selectSubcategory(sub)">



        <img
          *ngIf="sub.iconurl"
          [src]="sub.iconurl"
          [alt]="sub.subcategoryname">



        <span>
          {{sub.subcategoryname}}
        </span>



      </button>


    </div>









    <!-- PRODUCTS GRID -->

    <div class="results-list">

      <!-- CARD -->

      <div
        class="featured-card result-card"
        *ngFor="let item of filteredResults"
        (click)="openDetails(item)">

        <!-- IMAGE -->

        <div class="card-image">

          <span class="card-badge">

            {{item.displayType}}

          </span>


          <img
            [src]="item.mainImage"
            [alt]="item.displayTitle">


        </div>

        <!-- BODY -->

        <div class="card-body">


          <!-- CATEGORY -->

          <p class="category">

            ✦ {{item.displayCategory}}

          </p>
          <!-- TITLE -->

          <h4>

            {{item.displayTitle}}

          </h4>

          <!-- DESCRIPTION -->

          <p class="description">

            {{item.description || 
            'Quality service and best products available'}}

          </p>


          <!-- INFO -->

          <div class="info-row">


            <span>

              ⭐ 4.8

            </span>



            <span>

              <i class="fas fa-location-dot"></i>

              {{getDistrict(item)}}

            </span>


          </div>








          <!-- BOTTOM -->

          <div class="bottom-row">



            <div class="price-box">


              <strong
                *ngIf="item.displayPrice > 0">

                ₹{{item.displayPrice}}

              </strong>



            </div>





            <a class="card-link">

              View Details

            </a>



          </div>





        </div>



      </div>
</div>
<!-- MOBILE FILTER BAR -->

<div class="mobile-filter-bar">

  <button (click)="toggleFilter()">

    <i class="fas fa-sliders"></i>

    Filters

    <span>
      3
    </span>

  </button>


  <div class="mobile-location">

    📍 Madurai • 10 km

  </div>


  <button (click)="toggleFilter()">

    <i class="fas fa-chevron-up"></i>

  </button>

</div>
    </main>
</div>
